<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation: Reach Pickup | VaahanSetu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Exact same styling variables and layout as live_trip.html */
        :root {
            --primary: #10b981; /* Changed to Green for Pickup Phase */
            --primary-dark: #059669;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        .app-container {
            display: grid;
            grid-template-rows: 70px 1fr;
            grid-template-columns: 35% 65%; 
            height: 100vh;
        }

        .header {
            grid-column: 1 / -1;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 50;
        }
        .brand { display: flex; align-items: center; gap: 15px; }
        .brand img { object-fit: contain; max-width: 180px; }

        .live-status { display: flex; align-items: center; gap: 8px; color: var(--primary); font-weight: 700; font-size: 0.9rem; }
        .pulse-dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }

        .info-pane { 
            grid-column: 1;
            background: var(--bg); 
            overflow-y: auto; 
            padding: 2.5rem; 
            display: flex; 
            flex-direction: column; 
            gap: 2rem; 
            border-right: 1px solid var(--border);
        }
        
        .section-card { background: var(--surface); border-radius: 20px; padding: 1.5rem; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .customer-profile { display: flex; align-items: center; gap: 1rem; }
        .avatar { width: 50px; height: 50px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-sub); }
        
        .route-timeline { display: flex; flex-direction: column; gap: 1.5rem; position: relative; padding-left: 10px; }
        .timeline-item { display: flex; gap: 1rem; align-items: flex-start; }
        .timeline-item h4 { font-size: 0.75rem; color: var(--text-sub); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .timeline-item p { font-weight: 600; font-size: 1rem; line-height: 1.4; }

        .trip-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .stat-box { background: #f1f5f9; padding: 1rem; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.25rem; font-weight: 800; color: var(--text-main); margin-bottom: 2px; }
        .stat-label { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

        .finish-btn { 
            width: 100%; padding: 1.25rem; background: var(--text-main); color: white; 
            border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; 
            cursor: pointer; transition: 0.3s ease; margin-top: auto;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none;
        }

        .map-pane { grid-column: 2; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .map-controls { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .control-btn { width: 50px; height: 50px; background: white; border: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer; color: var(--text-main); }
        .control-btn.recenter { border-radius: 50%; background: var(--text-main); color: white; }

        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/VaahanSetu-Copy.png') }}" alt="VaahanSetu Logo" style="height: 45px;">
                <div style="background: #f1f5f9; padding: 6px 15px; border-radius: 8px; font-size: 0.85rem; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; margin-left: 10px;">
                    <span style="color: var(--text-sub); font-weight: 600; text-transform: uppercase; font-size: 0.7rem;">Phase:</span> 
                    <span style="color: var(--text-main); font-weight: 800; letter-spacing: 0.5px;">REACHING PICKUP</span>
                </div>
            </div>
            <div class="live-status">
                <div class="pulse-dot"></div> GPS ACTIVE
            </div>
        </header>

        <main class="info-pane">
            <div class="section-card">
                <div class="customer-profile">
                    <div class="avatar"><span class="material-symbols-rounded" style="font-size: 30px;">person</span></div>
                    <div>
                        <p style="font-size: 0.75rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase;">Customer</p>
                        <h3 style="font-weight: 800; margin-bottom: 2px;">{{ trip.customer_name }}</h3>
                        <p style="font-size: 0.85rem; font-weight: 700; color: var(--primary);">Contact: {{ trip.customer_phone }}</p>
                    </div>
                </div>
            </div>

            <div class="section-card">
                <div class="route-timeline">
                    <div class="timeline-item">
                        <span class="material-symbols-rounded" style="color: var(--success);">radio_button_checked</span>
                        <div>
                            <h4>Target Pickup Point</h4>
                            <p>{{ trip.pickup_location }}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="trip-stats">
                <div class="stat-box">
                    <span class="stat-val" id="distRemaining">---</span>
                    <span class="stat-label">DIST. TO PICKUP</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="timeRemaining">---</span>
                    <span class="stat-label">EST. ARRIVAL</span>
                </div>
            </div>

            <a href="/driver/my-trips" class="finish-btn">
                <span class="material-symbols-rounded">arrow_back</span>
                Exit Navigation
            </a>
        </main>

        <aside class="map-pane">
            <div id="map"></div>
            <div class="map-controls">
                <button class="control-btn" onclick="map.zoomIn()"><span class="material-symbols-rounded">add</span></button>
                <button class="control-btn" onclick="map.zoomOut()"><span class="material-symbols-rounded">remove</span></button>
                <button class="control-btn recenter" onclick="recenterMap()"><span class="material-symbols-rounded">my_location</span></button>
            </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const navColor = "#10b981";
        let lastDriverPos = null;

        const map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const truckIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448327.png',
            iconSize: [50, 50], iconAnchor: [25, 25]
        });

        const pickupPin = L.divIcon({
            html: `<span class="material-symbols-rounded" style="color:${navColor}; font-size:40px;">radio_button_checked</span>`,
            className: 'custom-pin', iconSize: [40, 40], iconAnchor: [20, 20]
        });

        let driverMarker = L.marker([0,0], {icon: truckIcon, zIndexOffset: 1000}).addTo(map);
        let routeLine = L.polyline([], {color: navColor, weight: 6, opacity: 0.8, dashArray: '10, 10'}).addTo(map);

        const pLat = parseFloat("{{ trip.pickup_lat }}");
        const pLng = parseFloat("{{ trip.pickup_lng }}");

        if (pLat && pLng) L.marker([pLat, pLng], {icon: pickupPin}).addTo(map);

        function updateLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    lastDriverPos = [lat, lng];
                    driverMarker.setLatLng(lastDriverPos);
                    
                    if (!map.getBounds().contains(lastDriverPos)) map.panTo(lastDriverPos);
                    fetchRoute(lat, lng);
                }, null, { enableHighAccuracy: true });
            }
        }

        async function fetchRoute(lat, lng) {
            const url = `https://router.project-osrm.org/route/v1/driving/${lng},${lat};${pLng},${pLat}?overview=full&geometries=geojson`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.code === 'Ok' && data.routes.length > 0) {
                    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    routeLine.setLatLngs(coords);
                    document.getElementById('distRemaining').innerText = (data.routes[0].distance / 1000).toFixed(1) + " km";
                    document.getElementById('timeRemaining').innerText = Math.round(data.routes[0].duration / 60) + " min";
                    
                    // Initial auto-zoom
                    if (!lastDriverPos) map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
                }
            } catch (e) { console.error(e); }
        }

        function recenterMap() { if (lastDriverPos) map.flyTo(lastDriverPos, 16); }
        updateLocation();
    </script>
</body>
</html>
