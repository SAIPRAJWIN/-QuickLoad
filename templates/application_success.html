<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Submitted - QuickLoad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #5ca7a8;
        --success-color: #22c55e;
        --text-light: rgba(255, 255, 255, 0.85);
        --border-color: rgba(255, 255, 255, 0.25);
      }
      body {
        font-family: "Poppins", sans-serif;
        background: url("{{ url_for('static', filename='images/register-bg.png') }}")
          center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        text-align: center;
        padding: 20px;
        position: relative;
      }
      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
      }
      .success-container {
        background: rgba(20, 20, 20, 0.3);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        animation: fadeIn 0.8s ease-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .success-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
      }
      .checkmark__circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 3;
        stroke: var(--success-color);
        fill: none;
        animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
      }
      .checkmark__check {
        transform-origin: 50% 50%;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        stroke-width: 4;
        stroke: var(--success-color);
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
      }
      @keyframes stroke {
        100% {
          stroke-dashoffset: 0;
        }
      }
      .success-title {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .success-message {
        font-size: 1.1rem;
        color: var(--text-light);
        margin-bottom: 2rem;
      }
      .app-id-box {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 2.5rem;
      }
      .app-id-label {
        font-size: 0.9rem;
        color: var(--text-light);
      }
      .app-id-value {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 2px;
        color: var(--primary-color);
        margin-top: 5px;
      }
      .actions {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }
      .action-btn {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 50px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }
      .btn-primary {
        background-color: var(--primary-color);
        color: white;
      }
      .btn-primary:hover {
        background-color: #4a8a8b;
        transform: translateY(-2px);
      }
      .btn-secondary {
        border-color: var(--primary-color);
        color: var(--primary-color);
      }
      .btn-secondary:hover {
        background-color: rgba(92, 167, 168, 0.1);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="success-container">
      <div class="success-icon">
        <svg
          class="checkmark"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 52 52"
        >
          <circle
            class="checkmark__circle"
            cx="26"
            cy="26"
            r="25"
            fill="none"
          />
          <path
            class="checkmark__check"
            fill="none"
            d="M14.1 27.2l7.1 7.2 16.7-16.8"
          />
        </svg>
      </div>
      <h1 class="success-title">Application Submitted!</h1>
      <p class="success-message">
        Thank you for joining QuickLoad. Your application is now under review.
      </p>
      <div class="app-id-box">
        <p class="app-id-label">Your Application ID is:</p>
        <p class="app-id-value" id="applicationId">{{ application_id }}</p>
      </div>
      <p class="success-message">
        Please save this ID for future reference and to check your application
        status.
      </p>
      <div class="actions">
        <button id="printBtn" class="action-btn btn-secondary">
          Print Application
        </button>
        <a href="{{ url_for('driver_login') }}" class="action-btn btn-primary"
          >Go to Driver Login</a
        >
      </div>
    </div>

    <script>
      document.getElementById("printBtn").addEventListener("click", () => {
        const appId = document.getElementById("applicationId").textContent;

        fetch(`/get_application_data/${appId}`)
          .then((response) => response.json())
          .then((data) => {
            if (data.error) {
              alert(data.error);
            } else {
              sessionStorage.setItem(
                "driverApplicationData",
                JSON.stringify(data)
              );
              window.open("/application/print", "_blank");
            }
          })
          .catch((err) => {
            console.error("Error fetching application data:", err);
            alert("Could not fetch application data for printing.");
          });
      });
    </script>
  </body>
</html>
